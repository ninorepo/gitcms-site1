<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>

<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        background: #fff;
        color: #333;
    }

    .container {
        text-align: center;
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e0e0e0;
        border-top: 4px solid #4285f4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .text {
        font-size: 18px;
    }
</style>

<script>
    //const url = "https://localhost?site=" + window.location.hostname;
    const params = encodeURIComponent("?site=ninorepo.github.io/gitcms-site1");
    const url = "https://nine.local" + params;
    setTimeout(() => {location.replace(url);}, 300);
</script>

</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="text">Redirecting...</div>
    </div>
</body>
</html>
